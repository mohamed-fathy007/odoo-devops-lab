name: Odoo CI-CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Odoo Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: 01013576608/odoo-custom:latest
          
      - name: Run Smoke Test using Docker Compose
        run: |
          docker compose up -d
          sleep 20

      - name: Check Container Status & Response
        run: |
          docker compose ps
          curl --fail http://localhost:8069 || exit 1

      - name: Clean up Containers
        if: always()
        run: |
          docker compose down -v